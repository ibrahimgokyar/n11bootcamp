# =========================

# App & Port

# =========================

spring.application.name=mcp-service

server.port=8090


# Config Server Baglantisi
# Docker ortaminda CONFIG_URI degiskeni gecilirse onu alir, yoksa localhost kullanir
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}

# Profil fallback (docker/local otomatik secilebilir)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =========================

# Upstream Product-Service

# =========================

mcp.product-service.url=http://94.73.134.50:8764



# =========================

# Logging

# =========================

logging.level.root=INFO

logging.level.com.n11bootcamp.mcp_server=DEBUG



# =========================

# (ÖNEMLİ) MCP Server (SSE/HTTP)

# -> Bu blok sende zaten vardı; aynen bırakıyorum.

# =========================

spring.ai.mcp.server.enabled=true

spring.ai.mcp.server.name=n11bootcamp-mcp

spring.ai.mcp.server.version=1.0.0

spring.ai.mcp.server.type=SYNC

spring.ai.mcp.server.base-url=/mcp

spring.ai.mcp.server.sse-endpoint=/sse

spring.ai.mcp.server.sse-message-endpoint=/message

spring.ai.mcp.server.capabilities.tool=true

spring.ai.mcp.server.capabilities.resource=false

spring.ai.mcp.server.capabilities.prompt=false

spring.ai.mcp.server.capabilities.completion=false

spring.ai.mcp.server.request-timeout=20s



# =========================

# CORS (React ve dış MCP istemcileri)

# =========================

# Var olan origin'lerin KALMASI önemli:

spring.web.cors.allowed-origins=http://localhost:3000,http://85.159.71.66:3000



# ngrok için wildcard gerektiğinde (destekleyen Spring Boot/Spring Web sürümlerinde çalışır; desteklemiyorsa sessizce yok sayılır):

spring.web.cors.allowed-origin-patterns=https://*.ngrok-free.app



spring.web.cors.allowed-methods=GET,POST,OPTIONS

spring.web.cors.allowed-headers=*

spring.web.cors.allow-credentials=true



# =========================

# Proxy/Gateway arkası (X-Forwarded-* için)

# =========================

server.forward-headers-strategy=framework



# =========================

# Timeout/Connection tuning

# =========================

# HTTP bağlantı kurulumu için (mevcut ayarın kalsın):

server.connection-timeout=60s



# SSE ve uzun süren isteklerde servlet async timeout'u kapat (özellikle /mcp ve /mcp/sse için önemli):

spring.mvc.async.request-timeout=-1



# (İsteğe bağlı) HTTP/2 bazı tünellerde sorun çıkarırsa kapatabilirsin:

# server.http2.enabled=false



# =========================

# Actuator (senin mevcut ayarın)

# =========================

management.endpoints.web.exposure.include=mappings





# =========================

# Redis Cache

# =========================

mcp.redis.cache.enabled=${MCP_REDIS_CACHE_ENABLED:true}

mcp.redis.cache.ttl-seconds=${MCP_REDIS_CACHE_TTL_SECONDS:300}

spring.data.redis.host=${REDIS_HOST:localhost}

spring.data.redis.port=${REDIS_PORT:6379}

spring.data.redis.timeout=2s